# Configuration file for command_Backup
# Encoding: UTF-8 (supports all languages)

[paths]
# Source directory to monitor
source_dir = E:\Zhangxiaoxu\JScript\111

# Backup destination directory
backup_dir = E:\Zhangxiaoxu\JScript\111\backup

# File extensions to backup (comma separated)
file_extensions = .mf4

# Time range in minutes (0 = no limit, >0 = only files modified within N minutes)
time_range_minutes = 5

# Delay before scanning in seconds (0 = immediate scan)
scan_delay_seconds = 2

# Monitor mode: 0 = single scan, >0 = continuous monitoring for N seconds
monitor_timeout_seconds = 30

# Scan interval in monitor mode (seconds)
monitor_interval_seconds = 0.5

#zxx
