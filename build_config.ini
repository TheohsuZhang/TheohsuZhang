# Build configuration for producing BOTH x86 (32-bit) and x64 (64-bit) executables.
# Encoding: UTF-8
#
# How it works (planned build scripts):
# - build_all.py will read this file
# - it will invoke python_x86 to produce the x86 exe, and python_x64 to produce the x64 exe
#
# IMPORTANT:
# - x86 build requires a 32-bit Python installed (e.g. "C:\Python311-32\python.exe")
# - x64 build requires a 64-bit Python installed (e.g. "C:\Python311\python.exe")
# - PyInstaller will be installed/used inside each interpreter environment

[python]
# Full path to 32-bit Python interpreter
# Example: C:\Python311-32\python.exe
python_x86 = D:\Programs\python38\python.exe

# Full path to 64-bit Python interpreter
# Example: C:\Python311\python.exe
python_x64 = D:\Programs\Python\python.exe

[build]
# Path to your PyInstaller spec file (relative to this project directory)
spec_file = command_Backup.spec

# Output directory for collected release artifacts (relative to this project directory)
release_dir = release

# Base name of the produced executable (without .exe)
app_name = command_Backup

# Whether to auto-bump the patch version in command_Backup.py before building
# Recommended: true when doing a single build; false when building both arches in one run
bump_version = false
